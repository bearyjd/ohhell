name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart test packages/ohhell_engine

  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart test packages/ohhell_protocol

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart test server

  flutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: flutter analyze
        working-directory: client

  flutter-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: flutter test
        working-directory: client

  # ── Release builds (tags only) ──────────────────────────────────────────────

  build-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [engine-tests, protocol-tests, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: flutter build apk --release
        working-directory: client
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [engine-tests, protocol-tests, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: dart pub get
      - run: flutter build linux --release
        working-directory: client
      - name: Archive Linux binary
        run: |
          cd client/build/linux/x64/release
          tar -czf ohhell-linux-x64.tar.gz bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: client/build/linux/x64/release/ohhell-linux-x64.tar.gz

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [engine-tests, protocol-tests, flutter-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: flutter build windows --release
        working-directory: client
      - name: Archive Windows binary
        run: |
          Compress-Archive -Path client\build\windows\x64\runner\Release\* -DestinationPath ohhell-windows-x64.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: ohhell-windows-x64.zip

  build-web:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [engine-tests, protocol-tests, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: flutter build web --release
        working-directory: client
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: client/build/web/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-linux, build-windows, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/linux-binary/ohhell-linux-x64.tar.gz
            artifacts/windows-binary/ohhell-windows-x64.zip
          generate_release_notes: true
